name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "database.rules.json"
      - "tests/database.rules.test.ts"
      - "tests/account-deletion.test.ts"
      - "tests/integration.test.ts"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "database.rules.json"
      - "tests/database.rules.test.ts"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run ${{ matrix.test-suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-suite: [test:rules, test:integration, test:deletion]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          # firebase emulators require java 21 or higher

      - run: pnpm install
      - run: pnpm run ${{ matrix.test-suite }}
