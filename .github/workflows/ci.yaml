name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "database.rules.json"
      - "tests/database.rules.test.ts"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "database.rules.json"
      - "tests/database.rules.test.ts"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test-security-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          # firebase emulators require java 21 or higher

      - run: pnpm install
      - run: pnpm test:rules
