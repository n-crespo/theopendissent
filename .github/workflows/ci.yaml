name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-security-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install
        # install project dependencies

      - run: pnpm test:rules
        # execute the mandatory test suite
